version: 2

models:
  - name: int_sales_enriched
    description: "Bảng Intermediate kết hợp dữ liệu Sales và Customer. Chứa logic phân loại đơn hàng (Order Category) trước khi đưa ra Mart."
    columns:
      - name: order_id
        description: "Mã đơn hàng."
      - name: customer_id
        description: "Mã khách hàng thực hiện giao dịch."
      - name: customer_name
        description: "Tên khách hàng (Join từ stg_customers)."
      - name: order_date
        description: "Ngày phát sinh giao dịch mua hàng."
      - name: revenue
        description: "Doanh thu của đơn hàng."
      - name: order_category
        description: "Phân loại đơn hàng. 'VIP' nếu doanh thu > 1,000,000 VNĐ, ngược lại là 'Standard'."