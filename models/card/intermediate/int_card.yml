version: 2

models:
  - name: int_card_segmentation
    description: "Model trung gian tính toán phân khúc hạng thẻ."
    columns:
      - name: card_id_hktmo
        description: "Định danh duy nhất của một thẻ."
        tests:
          - not_null
          # Ở tầng này kiểm tra unique để đảm bảo logic phân loại không làm nhân dòng dữ liệu
          - unique 
      - name: card_segment
        description: "Phân khúc hạng thẻ (Quy đổi từ LVL 1-4)."
        tests:
          - not_null
          - accepted_values:
              values: [
                'Visa Infinite', 'Visa Privilege Signature', 'Visa Signature', 
                'Visa Platinum', 'Visa Gold', 'JCB Gold', 'Visa Lotusmilepay', 
                'Visa Privilege Platinum', 'Visa Debit', 'Others'
              ]
      - name: lvl_1
        description: "Phân cấp sản phẩm thẻ (level 1)."
        tests:
          - accepted_values:
              values: ['Credit', 'Debit']

  - name: int_transaction_merchant
    description: "Model lọc giao dịch và phân loại Merchant."
    columns:
      - name: doc_id
        description: "Mã chứng từ giao dịch."
        tests:
          - not_null
          - unique
      - name: merchant
        description: "Tên đối tác bán hàng đã được chuẩn hóa."
        tests:
          - not_null
          # Kiểm tra đảm bảo không có giá trị trống (tránh lỗi logic Case When)
          - dbt_utils.expression_is_true:
              expression: "length(merchant) > 0"
      - name: billing_amount
        description: "Giá trị giao dịch."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: posting_date
        description: "Ngày hạch toán giao dịch."
        tests:
          - not_null
          # Test đảm bảo ngày hạch toán không vượt quá thời gian hiện tại
          - dbt_utils.expression_is_true:
              expression: "<= current_date"